name: Build APK
on:
  push:
    branches: [main]
permissions:
  contents: read
  actions: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager --licenses <<< "y"
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - run: npm install -g cordova@12.0.0
      - run: cordova platform add android@13.0.0
      - run: cordova plugin add cordova-plugin-whitelist
      - run: cordova build android --debug
      - uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-pro-debug
          path: platforms/android/app/build/outputs/apk/debug/*.apk